name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
      - run: python -m agent_setup --list

  windows-bootstrap:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\windows_bootstrap_test.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\remote_bootstrap_test.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\python_bootstrap_test.ps1

  shell-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: sh -n bootstrap.sh
      - run: sh -n install.sh
      - run: bash tests/test_bootstrap_tty.sh
      - run: bash tests/linux_path_test.sh
